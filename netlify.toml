# Shipboard — Netlify (Next.js / OpenNext adapter)
# Do not set publish to a partial folder; the Next plugin packages static + functions.
[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
  # Reduce white-screen skew when mid-session deploys change CSS hashes
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

# Optional: force HTTPS on custom domains
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
